<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080808;color:#f2f2f2;font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:16px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* HEADER */
.site-header,.hdr{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid #242424;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{font-family:'Syne','Arial Black',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;flex-shrink:0;color:#f2f2f2}
.logo span,.logo b{color:#c8ff00}
.header-search,.hsearch{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #242424;border-radius:10px;padding:8px 14px;width:300px;transition:border-color .2s}
.header-search:focus-within,.hsearch:focus-within{border-color:#c8ff00}
.header-search input,.hsearch input{background:none;border:none;outline:none;color:#f2f2f2;font-family:inherit;font-size:14px;width:100%}
.header-search input::placeholder,.hsearch input::placeholder{color:#5a5a5a}
.search-icon{color:#5a5a5a;font-size:15px}
.header-nav,.hnav{display:flex;gap:4px}
.nav-link,.hnav a{font-size:13px;font-weight:500;color:#5a5a5a;padding:7px 14px;border-radius:8px;transition:all .15s;display:inline-block}
.nav-link:hover,.hnav a:hover{color:#f2f2f2;background:#1a1a1a}

/* TOOL PAGE */
.tool-page,.pg{max-width:860px;margin:0 auto;padding:48px 40px 100px}

/* BREADCRUMB */
.breadcrumb,.bc{display:flex;align-items:center;gap:8px;font-size:13px;color:#5a5a5a;margin-bottom:36px;flex-wrap:wrap}
.breadcrumb a:hover,.bc a:hover{color:#c8ff00}
.breadcrumb span,.bc-sep{color:#333}

/* TOOL HEADER */
.tool-header,.th{margin-bottom:32px}
.tool-badge,.tbadge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;color:#c8ff00;background:rgba(200,255,0,.08);border:1px solid rgba(200,255,0,.2);border-radius:100px;padding:4px 14px;margin-bottom:18px;text-transform:uppercase;letter-spacing:1px;font-family:monospace}
.tool-header h1,.th h1{font-family:'Syne','Arial Black',sans-serif;font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-1.5px;margin-bottom:10px;color:#f2f2f2}
.tool-header p,.th p{color:#5a5a5a;font-size:16px}

/* BOX */
.tool-box,.box{background:#111;border:1px solid #242424;border-radius:16px;overflow:hidden;margin-bottom:14px}
.tool-box-header,.box-hdr{padding:12px 20px;border-bottom:1px solid #242424;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;color:#5a5a5a;text-transform:uppercase;letter-spacing:.8px;background:rgba(255,255,255,.02)}
.tool-box-body,.box-body{padding:22px}

/* INPUTS */
textarea,input[type=text],input[type=number],select{width:100%;background:#1a1a1a;border:1px solid #242424;border-radius:10px;color:#f2f2f2;font-family:inherit;font-size:15px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
textarea:focus,input:focus,select:focus{border-color:#c8ff00;box-shadow:0 0 0 3px rgba(200,255,0,.08)}
select option{background:#111;color:#f2f2f2}
input[type=range]{background:none;border:none;box-shadow:none;padding:0;accent-color:#c8ff00}
input[type=color]{border:1px solid #242424;border-radius:8px;background:#1a1a1a;cursor:pointer;padding:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn-primary,.btn-p{background:#c8ff00;color:#000}
.btn-primary:hover,.btn-p:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 20px rgba(200,255,0,.25)}
.btn-secondary,.btn-s{background:#1a1a1a;color:#f2f2f2;border:1px solid #242424}
.btn-secondary:hover,.btn-s:hover{border-color:rgba(200,255,0,.4);color:#c8ff00}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.btn-row,.brow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}

/* OUTPUT */
.output-area,.out{background:#1a1a1a;border:1px solid #242424;border-radius:10px;padding:16px;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;min-height:120px;word-break:break-all;white-space:pre-wrap;color:#f2f2f2}

/* OPTIONS */
.options-row,.orow{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.option-group,.og{display:flex;flex-direction:column;gap:7px;flex:1;min-width:140px}
.option-label,.ol{font-size:11px;font-weight:700;color:#5a5a5a;text-transform:uppercase;letter-spacing:.5px}

/* CHECKBOX */
.checkbox-row,.chk{display:flex;align-items:center;gap:8px;cursor:pointer}
.checkbox-row input[type=checkbox],.chk input{accent-color:#c8ff00;width:15px;height:15px}
.checkbox-row label,.chk label{font-size:14px;cursor:pointer;color:#f2f2f2}

/* TAGS */
.tag-row,.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:12px;padding:5px 14px;border-radius:100px;background:#1a1a1a;border:1px solid #242424;color:#5a5a5a;cursor:pointer;transition:all .15s;font-weight:500}
.tag:hover{border-color:rgba(200,255,0,.3);color:#f2f2f2}
.tag.active,.tag.on{background:rgba(200,255,0,.1);border-color:rgba(200,255,0,.4);color:#c8ff00}

/* UPLOAD */
.upload-zone,.upz{border:2px dashed #2a2a2a;border-radius:14px;padding:52px 32px;text-align:center;cursor:pointer;transition:all .2s;background:#1a1a1a}
.upload-zone:hover,.upz:hover,.upload-zone.drag-over,.upz.ov{border-color:rgba(200,255,0,.5);background:rgba(200,255,0,.03)}
.upload-zone input[type=file],.upz input{display:none}
.upload-icon,.upz-ico{font-size:44px;margin-bottom:14px;display:block}
.upload-text,.upz-t{font-weight:600;margin-bottom:6px;font-size:15px;color:#f2f2f2}
.upload-sub,.upz-s{font-size:13px;color:#5a5a5a}

/* PROGRESS */
.progress-bar,.pb{height:3px;background:#1a1a1a;border-radius:4px;overflow:hidden;margin-top:16px;display:none}
.progress-fill,.pf{height:100%;background:#c8ff00;border-radius:4px;transition:width .3s}

/* RESULTS GRID - fixed smaller size */
.result-grid,.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:16px;max-height:500px;overflow-y:auto;padding-right:4px}
.result-img-card,.rcard{background:#1a1a1a;border:1px solid #242424;border-radius:10px;overflow:hidden;text-align:center;transition:border-color .2s}
.result-img-card:hover,.rcard:hover{border-color:rgba(200,255,0,.3)}
.result-img-card img,.rcard img{width:100%;aspect-ratio:4/3;object-fit:cover}
.result-img-card .dl-btn,.rcard .dl{display:block;padding:7px;font-size:11px;font-weight:600;color:#c8ff00;background:rgba(200,255,0,.06);transition:background .2s}
.result-img-card .dl-btn:hover,.rcard .dl:hover{background:rgba(200,255,0,.14)}

/* INFO BOX */
.info-box,.info{background:#111;border:1px solid #242424;border-radius:14px;padding:24px 28px;margin-top:32px}
.info-box h3,.info h3{font-family:'Syne','Arial Black',sans-serif;font-size:17px;margin-bottom:10px;color:#f2f2f2}
.info-box p,.info p{color:#5a5a5a;font-size:14px;line-height:1.75}

/* RELATED */
.related-tools{margin-top:48px}
.related-tools h3{font-family:'Syne','Arial Black',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;color:#f2f2f2}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}

/* TOOL CARDS (for related) */
.tool-card{display:block;background:#111;border:1px solid #242424;border-radius:14px;padding:20px;transition:all .18s;position:relative;overflow:hidden;cursor:pointer}
.tool-card:hover{border-color:rgba(200,255,0,.3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.tool-icon{font-size:24px;margin-bottom:12px;display:block}
.tool-name{font-weight:600;font-size:14px;color:#f2f2f2}
.tool-desc{font-size:12px;color:#5a5a5a;line-height:1.5;margin-top:4px}

/* AD */
.ad-slot{background:#111;border:1px dashed #242424;border-radius:12px;padding:20px;text-align:center;color:#333;font-size:11px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin:24px 0;min-height:90px;display:flex;align-items:center;justify-content:center}

/* JSON colors */
.key{color:#79b8ff}.str{color:#c8ff00}.num{color:#f8c555}.bool{color:#ff7b72}.null-v{color:#888}
.json-out{font-family:'Courier New',monospace;font-size:13px;line-height:1.7;white-space:pre;overflow-x:auto;padding:16px;background:#1a1a1a;border-radius:10px;min-height:200px;border:1px solid #242424}

/* FOOTER */
.site-footer,.ftr{background:#111;border-top:1px solid #242424;padding:56px 40px;text-align:center}
.site-footer .footer-logo,.ftr-logo{font-family:'Syne','Arial Black',sans-serif;font-size:20px;font-weight:800;color:#f2f2f2;margin-bottom:10px}
.site-footer .footer-logo span,.ftr-logo b{color:#c8ff00}
.site-footer p,.ftr p{color:#5a5a5a;font-size:13px}
.footer-links,.flinks{display:flex;justify-content:center;gap:24px;margin:12px 0;flex-wrap:wrap}
.footer-links a,.flinks a{color:#5a5a5a;font-size:13px;transition:color .15s}
.footer-links a:hover,.flinks a:hover{color:#c8ff00}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#c8ff00;color:#000;font-weight:700;font-size:14px;padding:12px 22px;border-radius:10px;transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;box-shadow:0 4px 24px rgba(200,255,0,.3)}
.toast.show,.toast.on{transform:translateY(0);opacity:1}

/* SEARCH DROPDOWNS */
#header-search-results,#hero-search-results,#hsdrop,#msdrop,.sdrop{background:#111;border:1px solid #242424;border-radius:12px;margin-top:6px;max-height:320px;overflow-y:auto;display:none;z-index:200;box-shadow:0 24px 64px rgba(0,0,0,.8)}
.search-result-item,.sitem{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid #1a1a1a;transition:background .12s}
.search-result-item:last-child,.sitem:last-child{border-bottom:none}
.search-result-item:hover,.sitem:hover{background:#1a1a1a}
.sri-icon,.sitem-ico{font-size:18px;width:28px;text-align:center}
.sri-name,.sitem-name{font-weight:500;font-size:14px;color:#f2f2f2}
.sri-cat,.sitem-cat{font-size:11px;color:#5a5a5a;margin-top:1px}

/* ERROR */
.err{color:#ff4d4d;font-size:13px;padding:10px 16px;background:rgba(255,77,77,.08);border-radius:8px;border:1px solid rgba(255,77,77,.2);margin-top:10px}

/* MISC */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}
::selection{background:rgba(200,255,0,.2);color:#f2f2f2}

/* PREVIEW BOX styles */
.preview{background:#1a1a1a;border:1px solid #242424;border-radius:10px;padding:20px;min-height:200px;color:#f2f2f2;line-height:1.7;font-size:15px;overflow-y:auto;max-height:400px}
.preview h1,.preview h2,.preview h3{font-family:'Syne','Arial Black',sans-serif;margin-bottom:10px;margin-top:20px;color:#f2f2f2}
.preview h1:first-child,.preview h2:first-child,.preview h3:first-child{margin-top:0}
.preview p{margin-bottom:12px}
.preview code{background:rgba(200,255,0,.1);padding:2px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;color:#c8ff00}
.preview pre{background:#080808;padding:16px;border-radius:8px;overflow-x:auto;margin:12px 0;border:1px solid #242424}
.preview ul,.preview ol{padding-left:24px;margin-bottom:12px}
.preview li{margin-bottom:4px}
.preview blockquote{border-left:3px solid #c8ff00;padding-left:16px;color:#5a5a5a;margin:12px 0}
.preview a{color:#c8ff00;text-decoration:underline}
.preview strong{color:#f2f2f2}

/* SWATCH */
.swatch{height:90px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;cursor:pointer;transition:transform .2s;position:relative}
.swatch:hover{transform:scale(1.05)}
.swatch-label{font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(4px)}
.palette-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.palette-name{font-size:11px;font-weight:700;color:#5a5a5a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

@media(max-width:768px){
  .site-header,.hdr{padding:0 20px}
  .header-search,.hsearch{width:auto;flex:1}
  .tool-page,.pg{padding:32px 20px 80px}
}
@media(max-width:480px){.header-search,.hsearch{display:none}}
</style>

<script>
function toast(msg){let e=document.getElementById('__t');if(!e){e=document.createElement('div');e.id='__t';e.className='toast';document.body.appendChild(e);}e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copied!')).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('Copied!');});}
function downloadFile(c,n,t='text/plain'){const b=new Blob([c],{type:t});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
function downloadCanvas(c,n='image.png'){const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=n;a.click();}
</script>

</html>
